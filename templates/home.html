{% extends "base.html" %}

{% block content %}
<section class="hero">
    <div class="hero-content">
        <h1>Royal Oak</h1>
        <p>Welcome to our traditional inn and restaurant. Book your table online with ease.</p>

        {% if user.is_authenticated %}
            <a href="{% url 'reserve' %}" class="btn">Reserve a Table</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn">Log In to Reserve</a>
        {% endif %}
    </div>
</section>
{% endblock %}
